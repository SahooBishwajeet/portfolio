<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="icon" href="assets/favicon.png" />

    <meta
      property="og:title"
      content="Bishwajeet Sahoo - A Programmer, Developer & Researcher"
    />
    <meta property="og:site_name" content="Bishwajeet Sahoo" />
    <meta property="og:url" content="https://sahoobishwajeet.xyz" />
    <meta
      property="og:description"
      content="Bishwajeet Sahoo's Terminal Themed Portfolio Website"
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/assets/opengraph.png" />

    <script
      src="https://kit.fontawesome.com/d5effce557.js"
      crossorigin="anonymous"
    ></script>
    <title>Bishwajeet Sahoo</title>
  </head>

  <body>
    <main id="main">
      <div id="lines">
        <div id="line-1">BishwajeetSahoo.x31_01</div>
        <div id="line-2"></div>
        <div id="line-3"></div>
        <div id="line-4"></div>
        <div id="line-5"></div>
      </div>
      <div id="terminal">
        <div>
          <span id="prompt">
            <span id="pre-user"></span>@<span id="pre-host"></span>:$ ~
          </span>
        </div>
        <a id="write-lines"></a>
      </div>
      <div id="input-line">
        <div>
          <p id="password-input" style="display: none">
            Password:
            <input id="password-field" autocomplete="off" type="password" />
          </p>
          <p id="input-hidden">
            <span id="prompt">
              <span id="user"></span>@<span id="host"></span>:$ ~
            </span>
            <input
              id="user-input"
              type="text"
              enterkeyhint="Enter"
              spellcheck="false"
              autocapitalize="none"
              autocomplete="off"
            />
          </p>
        </div>
      </div>
    </main>
  </body>

  <script type="module" src="./modules/main.ts"></script>
  <script type="module" src="./modules/style.ts"></script>
</html>
